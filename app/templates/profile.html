{% extends "base.html" %}

{% block title %}个人资料 - Email Server{% endblock %}

{% block content %}
<div class="profile-container">
    <h2>个人资料</h2>

    <div class="profile-card">
        <h3>账户信息</h3>
        <div class="info-row">
            <span class="info-label">用户名</span>
            <span class="info-value" id="username">加载中...</span>
        </div>
        <div class="info-row">
            <span class="info-label">邮箱</span>
            <span class="info-value" id="email">加载中...</span>
        </div>
        <div class="info-row">
            <span class="info-label">角色</span>
            <span class="info-value" id="role">加载中...</span>
        </div>
        <div class="info-row">
            <span class="info-label">注册时间</span>
            <span class="info-value" id="createdAt">加载中...</span>
        </div>
    </div>

    <div class="profile-card">
        <h3>修改密码</h3>
        <form id="passwordForm">
            <div class="form-group">
                <label for="oldPassword">原密码</label>
                <input type="password" id="oldPassword" name="oldPassword" required minlength="6">
            </div>
            <div class="form-group">
                <label for="newPassword">新密码</label>
                <input type="password" id="newPassword" name="newPassword" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirmPassword">确认新密码</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6">
            </div>
            <button type="submit" class="btn-primary">修改密码</button>
        </form>
    </div>
</div>

<style>
.profile-container {
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
}

.profile-container h2 {
    margin-bottom: 20px;
    color: #2c3e50;
}

.profile-card {
    background: white;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    padding: 25px;
    margin-bottom: 20px;
}

.profile-card h3 {
    margin-bottom: 20px;
    color: #34495e;
    padding-bottom: 10px;
    border-bottom: 1px solid #eee;
}

.info-row {
    display: flex;
    padding: 12px 0;
    border-bottom: 1px solid #f5f5f5;
}

.info-row:last-child {
    border-bottom: none;
}

.info-label {
    width: 100px;
    color: #7f8c8d;
    font-size: 14px;
}

.info-value {
    flex: 1;
    color: #2c3e50;
    font-weight: 500;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    color: #34495e;
    font-weight: 500;
}

.form-group input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    box-sizing: border-box;
}

.form-group input:focus {
    outline: none;
    border-color: #3498db;
}

.btn-primary {
    padding: 12px 24px;
    background: #3498db;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.3s;
}

.btn-primary:hover {
    background: #2980b9;
}
</style>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    checkAuth();
    loadUserInfo();
});

async function loadUserInfo() {
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login';
        return;
    }

    try {
        const response = await fetch('/api/auth/me', {
            headers: {'Authorization': `Bearer ${token}`}
        });

        if (response.ok) {
            const user = await response.json();
            document.getElementById('username').textContent = user.username;
            document.getElementById('email').textContent = user.email;
            document.getElementById('role').textContent = user.is_admin ? '管理员' : '普通用户';
            document.getElementById('createdAt').textContent = new Date(user.created_at).toLocaleString();
        } else {
            showMessage('获取用户信息失败', 'error');
        }
    } catch (error) {
        showMessage('加载失败', 'error');
    }
}

document.getElementById('passwordForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const oldPassword = document.getElementById('oldPassword').value;
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (newPassword !== confirmPassword) {
        showMessage('两次输入的新密码不一致', 'error');
        return;
    }

    const token = localStorage.getItem('token');

    try {
        const response = await fetch('/api/auth/change-password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
                old_password: oldPassword,
                new_password: newPassword
            })
        });

        if (response.ok) {
            showMessage('密码修改成功', 'success');
            document.getElementById('passwordForm').reset();
        } else {
            const error = await response.json();
            throw new Error(error.detail || '修改失败');
        }
    } catch (error) {
        showMessage(error.message, 'error');
    }
});
</script>
{% endblock %}
