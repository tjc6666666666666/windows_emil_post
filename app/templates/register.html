{% extends "base.html" %}

{% block title %}注册 - Email Server{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>注册</h2>
        <div class="info-box">
            <p>📧 注册后将自动获得系统邮箱</p>
            <p id="emailHint">格式：用户名@<span id="mailDomain">加载中...</span></p>
        </div>
        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required 
                       minlength="3" maxlength="50" pattern="[a-zA-Z0-9]+"
                       placeholder="3-50位字母或数字" oninput="updateEmailPreview()">
                <small class="hint">只能包含字母和数字</small>
            </div>
            
            <div class="form-group">
                <label>您的邮箱地址</label>
                <div class="email-preview">
                    <span id="emailPreview">用户名</span>@<span id="domainPreview">域名</span>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required 
                       minlength="6" maxlength="100"
                       placeholder="至少6位密码">
            </div>
            
            <div class="form-group">
                <label for="confirm_password">确认密码</label>
                <input type="password" id="confirm_password" name="confirm_password" required 
                       minlength="6" placeholder="再次输入密码">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">注册</button>
        </form>
        
        <div class="auth-footer">
            <p>已有账号？<a href="/login">立即登录</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// 页面加载时获取域名和检查初始化状态
document.addEventListener('DOMContentLoaded', async function() {
    try {
        // 检查是否已初始化
        const initResponse = await fetch('/api/admin/check-init');
        const initData = await initResponse.json();

        if (!initData.initialized) {
            window.location.href = '/setup';
            return;
        }

        // 检查是否允许注册
        if (initData.allow_registration === false) {
            document.querySelector('.auth-card').innerHTML = `
                <h2>注册已关闭</h2>
                <div class="info-box" style="background: #fee; border-color: #fcc;">
                    <p>🚫 管理员已关闭新用户注册</p>
                    <p style="margin-top: 10px;">如有疑问，请联系管理员</p>
                </div>
                <div class="auth-footer">
                    <p>已有账号？<a href="/login">立即登录</a></p>
                </div>
            `;
            return;
        }

        // 获取域名配置
        const healthResponse = await fetch('/api/health');
        const healthData = await healthResponse.json();
        const domain = healthData.mail_domain || 'example.com';
        document.getElementById('mailDomain').textContent = domain;
        document.getElementById('domainPreview').textContent = domain;
    } catch (error) {
        console.error('获取配置失败:', error);
    }
});

function updateEmailPreview() {
    const username = document.getElementById('username').value;
    const preview = document.getElementById('emailPreview');
    preview.textContent = username || '用户名';
}

async function handleRegister(event) {
    event.preventDefault();

    const form = event.target;
    const password = form.password.value;
    const confirmPassword = form.confirm_password.value;

    if (password !== confirmPassword) {
        showMessage('两次密码不一致', 'error');
        return;
    }

    const data = {
        username: form.username.value,
        password: password
    };

    try {
        const response = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
            showMessage(`注册成功！您的邮箱是 ${result.email}`, 'success');
            setTimeout(() => {
                window.location.href = '/login';
            }, 2500);
        } else {
            showMessage(result.detail || '注册失败', 'error');
        }
    } catch (error) {
        showMessage('网络错误，请重试', 'error');
    }
}
</script>
{% endblock %}
