{% extends "base.html" %}

{% block title %}注册 - Email Server{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>注册</h2>
        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required 
                       minlength="3" maxlength="50" pattern="[a-zA-Z0-9]+"
                       placeholder="3-50位字母或数字">
            </div>
            
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" required 
                       placeholder="请输入邮箱地址">
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required 
                       minlength="6" maxlength="100"
                       placeholder="至少6位密码">
            </div>
            
            <div class="form-group">
                <label for="confirm_password">确认密码</label>
                <input type="password" id="confirm_password" name="confirm_password" required 
                       minlength="6" placeholder="再次输入密码">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">注册</button>
        </form>
        
        <div class="auth-footer">
            <p>已有账号？<a href="/login">立即登录</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function handleRegister(event) {
    event.preventDefault();
    
    const form = event.target;
    const password = form.password.value;
    const confirmPassword = form.confirm_password.value;
    
    if (password !== confirmPassword) {
        showMessage('两次密码不一致', 'error');
        return;
    }
    
    const data = {
        username: form.username.value,
        email: form.email.value,
        password: password
    };
    
    try {
        const response = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        
        if (response.ok) {
            showMessage('注册成功！正在跳转登录页面...', 'success');
            setTimeout(() => {
                window.location.href = '/login';
            }, 1500);
        } else {
            showMessage(result.detail || '注册失败', 'error');
        }
    } catch (error) {
        showMessage('网络错误，请重试', 'error');
    }
}
</script>
{% endblock %}
